services:
  mysql:
    image: mysql:8.4
    container_name: guessing-game-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: guessing_game
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guessing-game-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: guessing_game
      DB_USERNAME: root
      DB_PASSWORD: 123456
      JWT_SECRET: guessing-game-super-secret-key-for-jwt-2026
      JWT_EXPIRATION_MS: 86400000
      GAME_WIN_PROBABILITY: 0.05
      GAME_PURCHASE_TURNS: 5
    ports:
      - "${APP_HOST_PORT:-8080}:8080"

volumes: { mysql_data: }