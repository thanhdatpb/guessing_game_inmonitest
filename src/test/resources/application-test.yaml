spring:
  datasource:
    url: jdbc:h2:mem:guessing_game;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never

jwt:
  secret: guessing-game-super-secret-key-for-jwt-2026
  expiration-ms: 86400000

game:
  win-probability: 0.05
  purchase-turns: 5